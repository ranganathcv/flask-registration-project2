<!DOCTYPE html>
<html>
<head>
<title>Registration</title>
</head>

<body>

<h2>Registration Form</h2>

<form method="POST">
    {{ form.hidden_tag() }}

    <p>
        {{ form.name.label }}<br>
        {{ form.name() }}
    </p>

    <p>
        {{ form.email.label }}<br>
        {{ form.email() }}
    </p>

    <p>
        {{ form.password.label }}<br>
        {{ form.password() }}
    </p>

    <p>
        {{ form.confirm_password.label }}<br>
        {{ form.confirm_password() }}
    </p>

    <p>{{ form.submit() }}</p>

</form>

</body>
</html>
